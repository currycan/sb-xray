[program:s-ui]
command=sui
directory=/usr/local/bin
autorestart=true
priority=5
stdout_events_enabled=true
stderr_events_enabled=true
stdout_logfile=${LOGDIR}/supervisor/s-ui.out.log
stdout_logfile_maxbytes=0
stderr_logfile=${LOGDIR}/supervisor/s-ui.err.log
stderr_logfile_maxbytes=0

[program:x-ui]
command=x-ui
directory=/usr/local/bin
autorestart=true
priority=5
stdout_events_enabled=true
stderr_events_enabled=true
stdout_logfile=${LOGDIR}/supervisor/x-ui.out.log
stdout_logfile_maxbytes=0
stderr_logfile=${LOGDIR}/supervisor/x-ui.err.log
stderr_logfile_maxbytes=0

[program:cron]
command=/usr/sbin/crond -f
autorestart=true
priority=10
stdout_events_enabled=true
stderr_events_enabled=true
stdout_logfile=${LOGDIR}/supervisor/cron.out.log
stdout_logfile_maxbytes=0
stderr_logfile=${LOGDIR}/supervisor/cron.err.log
stderr_logfile_maxbytes=0

[program:dufs]
command=dufs -c ${WORKDIR}/dufs/conf.yml -a ${PUBLIC_USER}:${PUBLIC_PASSWORD}@/:rw
directory=/usr/local/bin
autorestart=true
priority=15
stdout_events_enabled=true
stderr_events_enabled=true
stdout_logfile=${LOGDIR}/supervisor/dufs.out.log
stdout_logfile_maxbytes=0
stderr_logfile=${LOGDIR}/supervisor/dufs.err.log
stderr_logfile_maxbytes=0

[program:http-meta]
command=node /sub-store/http-meta.bundle.js
directory=/sub-store/
autorestart=true
priority=15
stdout_events_enabled=true
stderr_events_enabled=true
stdout_logfile=${LOGDIR}/supervisor/http-meta.out.log
stdout_logfile_maxbytes=0
stderr_logfile=${LOGDIR}/supervisor/http-meta.err.log
stderr_logfile_maxbytes=0
environment=META_FOLDER=${SUB_STORE_META_FOLDER}

[program:sub-store]
command=node /sub-store/sub-store.bundle.js
directory=/sub-store/
autorestart=true
priority=15
stdout_events_enabled=true
stderr_events_enabled=true
stdout_logfile=${LOGDIR}/supervisor/sub-store.out.log
stdout_logfile_maxbytes=0
stderr_logfile=${LOGDIR}/supervisor/sub-store.err.log
stderr_logfile_maxbytes=0
environment=SUB_STORE_DOCKER=${SUB_STORE_DOCKER},SUB_STORE_FRONTEND_PATH=${SUB_STORE_FRONTEND_PATH},SUB_STORE_DATA_BASE_PATH=${SUB_STORE_DATA_BASE_PATH}

[program:xray]
# xray -test -confdir xray/
command=xray run -confdir ${WORKDIR}/xray/
directory=/usr/local/bin
autorestart=true
priority=20
stdout_events_enabled=true
stderr_events_enabled=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stdout
stderr_logfile_maxbytes=0

[program:sing-box]
command=sing-box run -C ${WORKDIR}/sing-box/
directory=/usr/local/bin
autorestart=true
priority=20
stdout_events_enabled=true
stderr_events_enabled=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stdout
stderr_logfile_maxbytes=0

[program:nginx]
command=/usr/sbin/nginx -g "daemon off;"
autostart=true
autorestart=true
priority=25
stdout_events_enabled=true
stderr_events_enabled=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stdout
stderr_logfile_maxbytes=0
stopsignal=QUIT
