# sb-xray 容器内日志轮转规则。
#
# 渲染：config_builder 经 _FLAT_RENDERS 用 envsubst 把 ${LOG_ROTATE_*} 占位符填好,
#       落到 /etc/logrotate.d/sb-xray。
# 调度：crontab 每 ${LOG_ROTATE_CRON} 调一次 `entrypoint.py log-rotate`(size-based)。
#
# 设计要点：
#  - copytruncate：nginx / xray / sing-box 持有日志 fd 且未必都支持 USR1 reopen,
#    统一 copytruncate 最稳(先 cp 再 truncate 原文件,进程无感)。代价是轮转瞬间
#    极小概率丢几行访问日志,对本场景可接受。
#  - 数字后缀(非 dateext)：size-based 高频轮转下,dateext 同一天多次触发会因目标
#    文件名冲突而跳过轮转(.gz 已存在),反而失效。数字后缀 .1/.2/.gz 每次重命名,无冲突。
#  - supervisord 主日志(supervisord.log)自带 SUPERVISOR_LOG_MAX_BYTES 轮转,不纳管,
#    避免双重管理;仅纳管其子进程的 *.out.log / *.err.log(maxbytes=0 无限增长)。

/var/log/nginx/*.log
/var/log/xray/*.log
/var/log/sing-box/*.log
/var/log/dufs/*.log
/var/log/supervisor/*.out.log
/var/log/supervisor/*.err.log
/var/log/*.log {
    size ${LOG_ROTATE_SIZE}
    rotate ${LOG_ROTATE_KEEP}
    missingok
    notifempty
    copytruncate
    compress
    delaycompress
}
