worker_processes    auto;

worker_rlimit_nofile 65536;

pid                 /var/run/nginx/nginx.pid ;

lock_file           /var/run/nginx/nginx.lock;

pcre_jit            on;

events {
    worker_connections  8192;
    multi_accept        on;
    accept_mutex        on;
    use                 epoll;
}

http {
    map $http_x_forwarded_for $client_ip {
        "" $remote_addr;
        "~*(?P<firstAddr>([0-9a-f]{0,4}:){1,7}[0-9a-f]{1,4}|([0-9]{1,3}\.){3}[0-9]{1,3})$" $firstAddr;
    }

    # Token 认证 Map - 用于条件性启用 HTTP 基础认证
    # 如果提供了正确的 Token，auth_basic_realm 设为 off
    # 否则设为 "Restricted" 以启用 HTTP 基础认证
    # 注意：${SUBSCRIBE_TOKEN} 会在启动时被 entrypoint.py 渲染流水线替换为实际值
    map $arg_token $auth_type {
        default "Restricted";  # 默认需要 HTTP 基础认证
        "${SUBSCRIBE_TOKEN}" "off";  # Token 正确时禁用 HTTP 基础认证
    }

    sendfile                     on;
    aio                         threads;
    tcp_nopush                  on;
    tcp_nodelay                 on;
    reset_timedout_connection   on;
    send_timeout                2;
    client_body_timeout         60;
    client_body_buffer_size     10M;
    client_max_body_size        10M;
    keepalive_timeout           60;
    server_tokens               off;
    types_hash_max_size         4096;
    http2                       on;
    ssl_early_data              on;
    ssl_session_cache           shared:SSL:60m;
    ssl_session_tickets         off;
    ssl_session_timeout         1440m;
    ssl_buffer_size             4k;
    ssl_protocols               TLSv1.3 TLSv1.2;
    ssl_ecdh_curve              X25519:secp521r1:secp384r1;
    ssl_ciphers                 TLS_CHACHA20_POLY1305_SHA256:TLS_AES_256_GCM_SHA384:ECDH+AESGCM+AES256:ECDH+CHACHA20;
    ssl_conf_command            Options ServerPreference,PrioritizeChaCha;
    ssl_conf_command            Ciphersuites TLS_CHACHA20_POLY1305_SHA256:TLS_AES_256_GCM_SHA384:ECDH+AESGCM+AES256:ECDH+CHACHA20;
    ssl_prefer_server_ciphers   on;
    ssl_stapling                on;
    ssl_stapling_verify         on;
    ssl_ocsp                    on;
    ssl_ocsp_cache              shared:ocspSSL:60m;
    ssl_verify_depth            2;
    resolver                    8.8.8.8 1.1.1.1 valid=300s;
    resolver_timeout            300s;

    # 速率限制配置 - 防止订阅端点被滥用
    limit_req_zone $binary_remote_addr zone=subscribe_limit:10m rate=10r/m;

    add_header                  Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header                  X-Content-Type-Options nosniff always;
    add_header                  X-Robots-Tag "noindex, nofollow, nosnippet, noarchive" always;
    add_header                  Content-Security-Policy upgrade-insecure-requests always;
    add_header                  Alt-Svc 'h3=":443"; quic=":443"; ma=86400; persist=1' always;
    add_header                  X-Frame-Options DENY;
    add_header                  X-XSS-Protection "1; mode=block";

    quic_retry                  on;
    quic_gso                    on;

    log_format simple '$ssl_server_name $scheme $ssl_alpn_protocol $status $ssl_protocol $server_protocol $ssl_curve $ssl_cipher';
    log_format main escape=json
        '{'
            '"@timestamp": "$time_iso8601",'
            '"ssl_server_name": "$ssl_server_name",'
            '"scheme": "$scheme",'
            '"ssl_alpn_protocol": "$ssl_alpn_protocol",'
            '"status": "$status",'
            '"ssl_protocol": "$ssl_protocol",'
            '"server_protocol": "$server_protocol",'
            '"ssl_curve": "$ssl_curve",'
            '"ssl_cipher": "$ssl_cipher"'
        '}';
    log_format http_json escape=json
        '{'
            '"@timestamp": "$time_iso8601", '
            '"msec": "$msec", '
            '"connection": "$connection", '
            '"connection_requests": "$connection_requests", '
            '"pid": "$pid", '
            '"request_id": "$request_id", '
            '"request_length": "$request_length", '
            '"remote_addr": "$remote_addr", '
            '"remote_user": "$remote_user", '
            '"remote_port": "$remote_port", '
            '"time_local": "$time_local", '
            '"request": "$request", '
            '"request_uri": "$request_uri", '
            '"args": "$args", '
            '"status": "$status", '
            '"body_bytes_sent": "$body_bytes_sent", '
            '"bytes_sent": "$bytes_sent", '
            '"http_referer": "$http_referer", '
            '"http_user_agent": "$http_user_agent", '
            '"http_x_forwarded_for": "$http_x_forwarded_for", '
            '"http_host": "$http_host", '
            '"host": "$host", '
            '"client_ip": "$client_ip",'
            '"ssl_server_name": "$ssl_server_name", '
            '"ssl_alpn_protocol": "$ssl_alpn_protocol", '
            '"server_name": "$server_name", '
            '"request_time": "$request_time", '
            '"upstream": "$upstream_addr", '
            '"upstream_status": "$upstream_status",'
            '"http_referrer": "$http_referer",'
            '"upstream_connect_time": "$upstream_connect_time", '
            '"upstream_header_time": "$upstream_header_time", '
            '"upstream_response_time": "$upstream_response_time", '
            '"upstream_response_length": "$upstream_response_length", '
            '"upstream_cache_status": "$upstream_cache_status", '
            '"ssl_protocol": "$ssl_protocol", '
            '"ssl_cipher": "$ssl_cipher", '
            '"ssl_curve": "$ssl_curve", '
            '"scheme": "$scheme", '
            '"request_method": "$request_method", '
            '"server_protocol": "$server_protocol", '
            '"pipe": "$pipe", '
            '"gzip_ratio": "$gzip_ratio", '
            '"http_cf_ray": "$http_cf_ray", '
            '"http_x_forwarded_proto": "$http_x_forwarded_proto" '
        '}';

    access_log                  ${LOGDIR}/nginx/http-access.log http_json;
    error_log                   stderr warn;

    gzip                        on;
    gzip_vary                   on;
    gzip_proxied                any;
    gzip_comp_level             6;
    gzip_buffers                16 8k;
    gzip_http_version           1.1;
    gzip_types                  text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    brotli                      on;
    brotli_comp_level           6;
    brotli_static               on;
    brotli_types                application/atom+xml application/javascript application/json application/vnd.api+json application/rss+xml
                                application/vnd.ms-fontobject application/x-font-opentype application/x-font-truetype
                                application/x-font-ttf application/x-javascript application/xhtml+xml application/xml
                                font/eot font/opentype font/otf font/truetype image/svg+xml image/vnd.microsoft.icon
                                image/x-icon image/x-win-bitmap text/css text/javascript text/plain text/xml;

    default_type                application/octet-stream;
    include                     /etc/nginx/mime.types;
    client_body_temp_path       /tmp/client_temp;
    proxy_temp_path             /tmp/proxy_temp_path;
    fastcgi_temp_path           /tmp/fastcgi_temp;

    proxy_buffering             off;
    proxy_buffer_size           16k;
    proxy_busy_buffers_size     24k;
    proxy_buffers               384 4k;
    proxy_max_temp_file_size    0;

    include /etc/nginx/conf.d/*.conf;
}

stream {

    log_format tcp_json escape=json
        '{'
            '"time_local":"$time_local",'
            '"remote_addr":"$remote_addr",'
            '"protocol":"$protocol",'
            '"status": "$status",'
            '"bytes_sent":"$bytes_sent",'
            '"bytes_received":"$bytes_received",'
            '"session_time":"$session_time",'
            '"upstream_addr":"$upstream_addr",'
            '"upstream_session_time":"$upstream_session_time",'
            '"upstream_bytes_sent": "$upstream_bytes_sent",'
            '"upstream_bytes_received": "$upstream_bytes_received",'
            '"upstream_connect_time": "$upstream_connect_time"'
        '}';

    access_log ${LOGDIR}/nginx/tcp-access.log tcp_json;

    include /etc/nginx/stream.d/*.conf;
}
