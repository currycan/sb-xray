# WebSocket 支持配置
# Nginx 动态处理 Connection 头：
# - 如果 Upgrade 头存在（如 "websocket"），Connection 设为 "upgrade"（保持连接）
# - 否则设为 "close"（普通 HTTP 请求结束即关闭）
map $http_upgrade $connection_upgrade {
    default upgrade;
    ""      close;
}

# --- RFC 7239 Forwarded 头部支持 (标准化 IP 传递) ---

# 1. 格式化当前客户端 IP
# 根据 IP 类型（IPv4/IPv6）将其封装为符合 RFC 标准的格式
# IPv4: for=1.2.3.4
# IPv6: for="[2001:db8::1]"
map $remote_addr $proxy_forwarded_elem {
    ~^[0-9.]+$        "for=$remote_addr";
    ~^[0-9A-Fa-f:.]+$ "for=\"[$remote_addr]\"";
    default           "for=unknown";
}

# 2. 生成/追加 Forwarded 头部
# 智能追加新的代理记录到现有的 Forwarded 链中
# 相比 X-Forwarded-For，这是更现代的标准，对 gRPC 等协议支持更好
map $http_forwarded $proxy_add_forwarded {
    # 如果现有头部合法，将新记录追加到末尾： "旧记录, 新记录"
    "~^(,[ \\t]*)*([!#$%&'*+.^_`|~0-9A-Za-z-]+=([!#$%&'*+.^_`|~0-9A-Za-z-]+|\"([\\t \\x21\\x23-\\x5B\\x5D-\\x7E\\x80-\\xFF]|\\\\[\\t \\x21-\\x7E\\x80-\\xFF])*\"))?(;([!#$%&'*+.^_`|~0-9A-Za-z-]+=([!#$%&'*+.^_`|~0-9A-Za-z-]+|\"([\\t \\x21\\x23-\\x5B\\x5D-\\x7E\\x80-\\xFF]|\\\\[\\t \\x21-\\x7E\\x80-\\xFF])*\"))?)*([ \\t]*,([ \\t]*([!#$%&'*+.^_`|~0-9A-Za-z-]+=([!#$%&'*+.^_`|~0-9A-Za-z-]+|\"([\\t \\x21\\x23-\\x5B\\x5D-\\x7E\\x80-\\xFF]|\\\\[\\t \\x21-\\x7E\\x80-\\xFF])*\"))?(;([!#$%&'*+.^_`|~0-9A-Za-z-]+=([!#$%&'*+.^_`|~0-9A-Za-z-]+|\"([\\t \\x21\\x23-\\x5B\\x5D-\\x7E\\x80-\\xFF]|\\\\[\\t \\x21-\\x7E\\x80-\\xFF])*\"))?)*)?)*$" "$http_forwarded, $proxy_forwarded_elem";

    # 如果没有现有头部或格式不对，直接使用新记录
    default "$proxy_forwarded_elem";
}

server {
    listen                          80   default_server;
    listen                          [::]:80;
    server_name                     _;
    return 301                      https://$host$request_uri; #HTTP 自动跳转 HTTPS，让网站看起来更真实。
}

server {
    # 主域名 Reality h3 伪装站设置
    listen                          ${LISTENING_PORT} quic reuseport;
    listen                          [::]:${LISTENING_PORT} quic reuseport;
    # [CRITICAL] Reality Fallback 专用监听
    # 从 Reality 回落的流量已经是解密后的明文（或 H2C）。
    # 不要在此 socket 开启 ssl，否则会导致 Reality 直连失败！
    listen                          unix:/dev/shm/nginx.sock proxy_protocol;

    # cdn域名 h2 伪装站设置
    listen                          unix:/dev/shm/cdnh2.sock ssl proxy_protocol backlog=2048 so_keepalive=on;

    # server_name                     ${DOMAIN};
    # server_name                     ${CDNDOMAIN};

    set_real_ip_from                unix:;
    real_ip_header                  proxy_protocol;

    ssl_trusted_certificate          ${SSL_PATH}/sb_xray_bundle-ca.crt;
    ssl_certificate                  ${SSL_PATH}/sb_xray_bundle.crt;
    ssl_certificate_key              ${SSL_PATH}/sb_xray_bundle.key;

    keepalive_time                  2h;
    keepalive_timeout               600s;
    keepalive_requests              2048;
    client_body_buffer_size         1m;
    client_body_timeout             600s;
    client_header_timeout           300s;
    large_client_header_buffers     8 16k;
    proxy_connect_timeout           30s;
    proxy_read_timeout              2h;
    proxy_send_timeout              2h;
    proxy_buffering                 off;
    proxy_request_buffering         off;

    # Location Blocks

    location /${XRAY_URL_PATH}-xhttp/ { #与 VLESS+XHTTP 应用中 path 对应
        # 以下参数请根据服务器内存大小自行调整
        grpc_buffer_size            16k;
        grpc_socket_keepalive       on;
        grpc_read_timeout           1h;
        grpc_send_timeout           1h;

        grpc_set_header Connection         "";
        grpc_set_header X-Real-IP          $remote_addr;
        grpc_set_header Forwarded          $proxy_add_forwarded;
        grpc_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        grpc_set_header X-Forwarded-Proto  $scheme;
        grpc_set_header X-Forwarded-Port   $server_port;
        grpc_set_header Host               $host;
        grpc_set_header X-Forwarded-Host   $host;

        grpc_pass                           unix:/dev/shm/udsxhttp.sock;#转发给本机 VLESS+XHTTP 监听进程
    }

    location /${XRAY_URL_PATH}-vmessws {
        if ($http_upgrade != "websocket") {
            return 302 https://www.globe.com.ph;
        }
        proxy_redirect              off;
        proxy_http_version          1.1;
        proxy_set_header            Upgrade $http_upgrade;
        proxy_set_header            Connection "upgrade";
        proxy_set_header            Host $host;
        proxy_set_header            X-Real-IP $remote_addr;
        proxy_set_header            X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header            X-Forwarded-Proto $scheme;
        proxy_set_header            X-Forwarded-Port $server_port;
        proxy_pass                  http://unix:/dev/shm/udsvmessws.sock;
    }

    location ${DUFS_PATH_PREFIX}/ {
        proxy_pass                  http://127.0.0.1:${DUFS_PORT}${DUFS_PATH_PREFIX}/;
    }

    location /supervisor/ {
        proxy_pass                  http://unix:/var/run/supervisor.sock:/;
        proxy_set_header            X-Real-IP $remote_addr;
        proxy_set_header            X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header            X-Forwarded-Proto $scheme;
        proxy_set_header            Host $host;

        # 防止长连接超时问题
        proxy_read_timeout          300;
        proxy_send_timeout          300;

        # WebSocket 支持，用于日志流
        proxy_http_version          1.1;
        proxy_set_header            Connection "upgrade";

        proxy_redirect              default;
    }

    location /${XUI_WEBBASEPATH}/ {
        proxy_pass                  http://127.0.0.1:${XUI_LOCAL_PORT}/${XUI_WEBBASEPATH}/;
    }

    location /${SUI_WEBBASEPATH}/ {
        proxy_pass                  http://127.0.0.1:${SUI_PORT}/${SUI_WEBBASEPATH}/;
    }

    location /${SUI_SUB_PATH}/ {
        proxy_pass                  http://127.0.0.1:${SUI_SUB_PORT}/${SUI_SUB_PATH}/;
    }

    location ${SUB_STORE_FRONTEND_BACKEND_PATH}/ {
        proxy_pass                  http://127.0.0.1:${SUB_STORE_BACKEND_API_PORT}/;
    }

    location ~ ^/(${SUB_STORE_WEBBASEPATH}|my|subs|preview|edit|sync|files|shares|settings|aboutUs|404)(?:/(.*))?$ {
        rewrite ^/(${SUB_STORE_WEBBASEPATH}|my|subs|preview|edit|sync|files|shares|settings|aboutUs|404)(?:/(.*))?$ /$2 break;
        proxy_pass                  http://127.0.0.1:${SUB_STORE_FRONTEND_PORT};
    }

    # 订阅配置访问端点 - 高级安全加固版本（防扫描攻击）
    # 使用命名捕获组 (?<filename>...) 避免变量混淆
    # 允许的字符：字母、数字、点、下划线、连字符 (支持 .yaml 后缀或无后缀文件)
    location ~ ^/sb-xray/(?<filename>[a-zA-Z0-9._-]+)$ {
        # --- 1. 基础访问控制 ---
        autoindex off;           # 禁止列出目录
        log_not_found off;       # 404 不写入错误日志，减少扫描噪声
        access_log /var/log/nginx/subscribe_access.log combined; # 独立访问日志

        # --- 2. 身份验证 (Token 或 Basic Auth) ---
        # 认证逻辑由 nginx.conf 的 map 指令控制 ($auth_type)
        auth_basic $auth_type;
        auth_basic_user_file /etc/nginx/.htpasswd;
        error_page 401 = @auth_error; # 认证失败隐蔽为 404

        # --- 3. 速率限制 ---
        # zone=subscribe_limit: 限制请求频率
        # burst=5: 允许短时间内的突发请求（如浏览器并发加载）
        # nodelay: 突发请求不延迟处理，超过 burst 直接拒绝
        limit_req zone=subscribe_limit burst=5 nodelay;
        limit_req_status 404;    # 超过限制返回 404，隐蔽防护措施

        # --- 4. 安全响应头 ---
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header X-Robots-Tag "noindex, nofollow, noarchive" always;

        # --- 5. 缓存控制 (禁止缓存敏感配置) ---
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;

        # --- 6. 内容服务 ---
        default_type 'text/plain; charset=utf-8';

        # 安全的文件路径映射 (利用命名捕获变量)
        alias ${WORKDIR}/subscribe/$filename;
    }

    # 自定义错误页面 - 统一错误响应
    location @auth_error {
        return 404;
    }

    # 拒绝所有其他 /sb-xray/ 路径 - 记录扫描尝试
    location ~ ^/sb-xray/ {
        access_log /var/log/nginx/subscribe_scan.log combined;
        return 404;
    }

    # 根目录设置伪装站
    location / {
        proxy_pass                  https://${DEST_HOST};  # cdn回落域名
        proxy_set_header            Host ${DEST_HOST};  # cdn回落域名
        proxy_set_header            X-Real-IP $remote_addr;
        proxy_set_header            X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header            X-Forwarded-Proto $scheme;
        proxy_set_header            X-Forwarded-Host $host;
    }

    # location / {
    #     root                /home/wwwroot/html${RANDOM_NUM};
    #     index index.html    index.htm;
    # }
}
