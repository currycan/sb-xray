# ==================== ж ёеҝғй…ҚзҪ® ====================
mode: rule
mixed-port: 7890
ipv6: true
allow-lan: true
log-level: warning

# й…ҚзҪ®еӯҳеӮЁ
profile:
  store-selected: true
  store-fake-ip: true

# TUN жЁЎејҸпјҲз»Ҳз«Ҝи®ҫеӨҮпјҡејҖеҗҜиҮӘеҠЁи·Ҝз”ұдёҺжҺҘеҸЈжЈҖжөӢпјү
tun:
  enable: true
  stack: gvisor
  device: utun
  endpoint-independent-nat: true
  auto-route: true
  auto-detect-interface: true
  auto-redirect: false
  strict-route: false

# DNS й…ҚзҪ®
dns:
  enable: true
  cache-algorithm: arc
  listen: 0.0.0.0:7874
  ipv6: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.20.0.1/16
  nameserver:
    - 119.29.29.29 # DNSPod
    - 223.5.5.5 # йҳҝйҮҢ DNS
    # дёҠжө·з”өдҝЎ DNS
    - 202.96.209.5
    - 202.96.209.133
    - 116.228.111.118
    # дёҠжө·иҒ”йҖҡ DNS
    - 210.22.70.3
    - 210.22.84.3
  # д»ЈзҗҶжңҚеҠЎеҷЁеҹҹеҗҚдё“з”Ё DNSпјҲDoH IPзӣҙиҝһпјҢйҳІжӯўд»ЈзҗҶиҠӮзӮ№еҹҹеҗҚжі„йңІз»ҷ ISPпјү
  proxy-server-nameserver:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
  # еҲҶжөҒ DNS зӯ–з•ҘпјҲеўғеҶ…иө°жң¬ең° DNSпјҢеўғеӨ–иө° DoH еҠ еҜҶи§ЈжһҗпјҢйҳІжӯўе…ЁйҮҸжҹҘиҜўжі„йңІпјү
  nameserver-policy:
    "geosite:private,cn": "119.29.29.29"
    "geosite:geolocation-!cn": "https://1.1.1.1/dns-query"
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - "geosite:cn"

  # ж”ҜжҢҒйҖҡй…Қз¬ҰеҹҹеҗҚ (дҫӢеҰӮ: *.clash.dev, *.foo.*.example.com )
  # дёҚдҪҝз”ЁйҖҡй…Қз¬Ұзҡ„еҹҹеҗҚдјҳе…Ҳзә§й«ҳдәҺдҪҝз”ЁйҖҡй…Қз¬Ұзҡ„еҹҹеҗҚ (дҫӢеҰӮ: foo.example.com > *.example.com > .example.com )
  # жіЁж„Ҹ: +.foo.com зҡ„ж•ҲжһңзӯүеҗҢдәҺ .foo.com е’Ң foo.com
  hosts:
    "*.clash.dev": 127.0.0.1
    "alpha.clash.dev": "::1"
  # и·іиҝҮиҜҒд№ҰйӘҢиҜҒ,и§ЈеҶійғЁеҲҶе…је®№жҖ§й—®йўҳ https://help.nextdns.io/t/g9hdkjz
  skip-cert-verify: false
# ==================== EOF ====================
