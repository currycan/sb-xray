# ==================== 核心配置 ====================
mode: rule
mixed-port: 7890
ipv6: true
allow-lan: true
log-level: warning


# 配置存储
profile:
  store-selected: true
  store-fake-ip: true

# TUN 模式（终端设备：开启自动路由与接口检测）
tun:
  enable: true
  stack: gvisor
  device: utun
  endpoint-independent-nat: true
  auto-route: true
  auto-detect-interface: true
  auto-redirect: false
  strict-route: false

# DNS 配置
dns:
  enable: true
  cache-algorithm: arc
  listen: 0.0.0.0:7874
  ipv6: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.20.0.1/16
  nameserver:
    - 119.29.29.29   # DNSPod
    - 223.5.5.5      # 阿里 DNS
    # 上海电信 DNS
    - 202.96.209.5
    - 202.96.209.133
    - 116.228.111.118
    # 上海联通 DNS
    - 210.22.70.3
    - 210.22.84.3
  # 代理服务器域名专用 DNS（DoH IP直连，防止代理节点域名泄露给 ISP）
  proxy-server-nameserver:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
  # 分流 DNS 策略（境内走本地 DNS，境外走 DoH 加密解析，防止全量查询泄露）
  nameserver-policy:
    "geosite:private,cn": "119.29.29.29"
    "geosite:geolocation-!cn": "https://1.1.1.1/dns-query"
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - "geosite:cn"

  # 支持通配符域名 (例如: *.clash.dev, *.foo.*.example.com )
  # 不使用通配符的域名优先级高于使用通配符的域名 (例如: foo.example.com > *.example.com > .example.com )
  # 注意: +.foo.com 的效果等同于 .foo.com 和 foo.com
  hosts:
    "*.clash.dev": 127.0.0.1
    "alpha.clash.dev": "::1"
  # 跳过证书验证,解决部分兼容性问题 https://help.nextdns.io/t/g9hdkjz
  skip-cert-verify: false
# ==================== EOF ====================
