MediaSmart:     &MediaSmart  {type: smart,        interval: 180, tolerance: 1000, lazy: true, url: "https://www.gstatic.com/generate_204", uselightgbm: true, collectdata: true}
StableSmart:    &StableSmart {type: smart,        interval: 180, tolerance: 800,  lazy: true, url: "https://www.gstatic.com/generate_204", uselightgbm: true, collectdata: true}

