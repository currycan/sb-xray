FilterHK:       &FilterHK  "^(?=.*(?i)(广港|香港|HK|Hong Kong|🇭🇰|HongKong|深港|沪港|呼港|京港|杭港|Hong[\\s-]?Kong|HONG[\\s-]?KONG))(?!.*(5x)).*$"
FilterTW:       &FilterTW  "^(?=.*(?i)(广台|台湾|台灣|TW|Tai Wan|🇹🇼|🇨🇳|TaiWan|Taiwan|新[北竹]|彰化|高雄|[台臺][湾灣北]|Taipei|Kaohsiung|Hsinchu|Taichung))(?!.*(5x)).*$"
FilterSG:       &FilterSG  "^(?=.*(?i)(广新|新加坡|SG|坡|狮城|🇸🇬|Singapore|[狮獅]城|Changi))(?!.*(5x)).*$"
FilterJP:       &FilterJP  "^(?=.*(?i)(广日|日本|JP|川日|东京|大阪|泉日|埼玉|沪日|深日|🇯🇵|Japan|名古屋|福冈|Tokyo|Osaka|Saitama|Nagoya|Fukuoka|Hokkaido|Okinawa|Kyoto|Yokohama))(?!.*(5x)).*$"
FilterKR:       &FilterKR  "^(?=.*(?i)(广韩|韩国|韓國|KR|首尔|春川|🇰🇷|Korea|[韩韓][国國]|South[\\s-]?Korea|Seoul|Incheon|Busan|Chuncheon))(?!.*(5x)).*$"
FilterOT:       &FilterOT  "^(?!.*(DIRECT|REJECT|直接连接|住宅|isp|ISP|广港|香港|HK|Hong Kong|🇭🇰|HongKong|深港|沪港|呼港|京港|杭港|Hong[\\s-]?Kong|HONG[\\s-]?KONG|广台|台湾|台灣|TW|Tai Wan|🇹🇼|🇨🇳|TaiWan|Taiwan|新[北竹]|彰化|高雄|[台臺][湾灣北]|Taipei|Kaohsiung|Hsinchu|Taichung|广日|日本|JP|川日|东京|大阪|泉日|埼玉|沪日|深日|🇯🇵|Japan|名古屋|福冈|Tokyo|Osaka|Saitama|Nagoya|Fukuoka|Hokkaido|Okinawa|Kyoto|Yokohama|广新|新加坡|SG|坡|狮城|🇸🇬|Singapore|[狮獅]城|Changi|广韩|韩国|韓國|KR|首尔|春川|🇰🇷|Korea|[韩韓][国國]|South[\\s-]?Korea|Seoul|Incheon|Busan|Chuncheon|广美|US|美国|纽约|波特兰|达拉斯|俄勒|凤凰城|费利蒙|洛杉|圣何塞|圣克拉|西雅|芝加|🇺🇸|United States|美[国國]|华盛顿|菲尼克斯|弗里蒙特|硅谷|旧金山|拉斯维加斯|圣荷西|哥伦布|阿什本|纽瓦克|丹佛|加利福尼亚|弗吉尼亚|马纳萨斯|俄亥俄|得克萨斯|[佐乔]治亚|亚特兰大|佛罗里达|迈阿密|United[\\s-_]+States|Los[\\s-_]+Angeles|San[\\s-_]+Jose|Silicon[\\s-_]+Valley|San[\\s-_]+Francisco|Santa[\\s-_]+Clara|Seattle|Chicago|New[\\s-_]+York|Miami|Dallas|Phoenix|Fremont|Atlanta|Boston|Las[\\s-_]+Vegas|Houston|Ashburn|Buffalo|Washington|D\\.C\\.|Oregon|Portland|Virginia|Ohio|Texas|Florida|Illinois|Arizona|Orem|Kansas|5x)).*$"

# 节点筛选正则表达式 - 家宽节点
FilterISP:      &FilterISP    "^(?=.*(?i)(住宅|isp|ISP|AllOne))(?!.*(DIRECT|直接连接|5x)).*$"
FilterMedia:    &FilterMedia  "^(?=.*(?i)(流媒体|AllOne))(?!.*(DIRECT|直接连接|5x)).*$"
# 节点筛选正则表达式 - 高速节点
FilterFAST:     &FilterFAST   "^(?=.*(?i)(高速))(?!.*(DIRECT|直接连接|5x)).*$"
# 节点筛选正则表达式 - AI节点
FilterAI:       &FilterAI     "^(?=.*(?i)(AI|AllOne))(?!.*(DIRECT|直接连接|5x)).*$"
# 节点筛选正则表达式 - 过滤链式代理节点
FilterDialer:   &FilterDialer "^(?=.*(?i)(🇭🇰|🇹🇼|🇨🇳))(?!.*(DIRECT|直接连接|REJECT|-dialer)).*$"

# ==================== Policy-Priority 模板 ====================
# 设计理念: filter 负责筛选节点范围, policy-priority 负责在筛选结果中进行多维度排序
#
# 权重维度说明:
#   - 特性标签: 高速(10)
#   - 协议性能: XTLS(8)+Reality(20)=28, Xhttp+Reality(20)+Xhttp(5)=25, Hysteria2(8), AnyTLS(5), TUIC(3), Vmess(2)
#   - 质量后缀: super(30), good(10)
#   - 地区偏好: 根据不同场景动态调整
#
# ==================== 基础权重配置(所有策略共享) ====================
# 格式: 高速:10;Reality:20;XTLS:8;Xhttp:5;Hysteria2:8;AnyTLS:5;TUIC:3;Vmess:2;super:30;good:10
# 说明: 以下所有策略都包含此基础权重,仅地区偏好部分有差异
# ---------- 默认策略 ----------
# 地区偏好: 无
PolicyDefault:  &PolicyDefault  "高速:10;Reality:20;XTLS:8;Xhttp:5;Hysteria2:8;AnyTLS:5;TUIC:3;Vmess:2;super:30;good:10"
# ---------- 家宽策略 ----------
# 地区偏好: 🇺🇸:20 > 🇰🇷:10 > 🇯🇵:6 > 🇸🇬:4 > 🇹🇼:2
PolicyISP:      &PolicyISP      "高速:10;Reality:20;XTLS:8;Xhttp:5;Hysteria2:8;AnyTLS:5;TUIC:3;Vmess:2;super:30;good:10;🇺🇸:20;🇰🇷:10;🇯🇵:6;🇸🇬:4;🇹🇼:2"
# ---------- 流媒体策略 ----------
# 地区偏好: 🇺🇸:15 > 🇰🇷:8 > 🇯🇵:6 > 🇸🇬:4 > 🇹🇼:2
PolicyMedia:    &PolicyMedia    "高速:10;Reality:20;XTLS:8;Xhttp:5;Hysteria2:8;AnyTLS:5;TUIC:3;Vmess:2;super:30;good:10;🇺🇸:15;🇰🇷:8;🇯🇵:6;🇸🇬:4;🇹🇼:2"
# ---------- 高速策略 ----------
# 地区偏好: 🇺🇸:15 > 🇯🇵:10 > 🇰🇷:8 > 🇸🇬:4 > 🇹🇼:2
PolicyFast:     &PolicyFast     "高速:10;Reality:20;XTLS:8;Xhttp:5;Hysteria2:8;AnyTLS:5;TUIC:3;Vmess:2;super:30;good:10;🇺🇸:15;🇯🇵:10;🇰🇷:8;🇸🇬:4;🇹🇼:2"
# ---------- AI 服务策略 ----------
# 地区偏好: 🇺🇸:20 > 🇯🇵:10 > 🇰🇷:8 > 🇸🇬:4 > 🇹🇼:2
PolicyAI:       &PolicyAI       "高速:10;Reality:20;XTLS:8;Xhttp:5;Hysteria2:8;AnyTLS:5;TUIC:3;Vmess:2;super:30;good:10;🇺🇸:20;🇯🇵:10;🇰🇷:8;🇸🇬:4;🇹🇼:2"
# ---------- 链式代理策略 ----------
# 地区偏好: 🇭🇰:20 > 🇹🇼:15 > 🇨🇳:15 > 🇰🇷:10 > 🇯🇵:6 > 🇸🇬:4 > 🇺🇸:2
PolicyDialer:   &PolicyDialer   "高速:10;Reality:20;XTLS:8;Xhttp:5;Hysteria2:8;AnyTLS:5;TUIC:3;Vmess:2;super:30;good:10;🇭🇰:20;🇹🇼:15;🇨🇳:15;🇰🇷:10;🇯🇵:6;🇸🇬:4;🇺🇸:2"

