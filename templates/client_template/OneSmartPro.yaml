  store-fake-ip: true

# TUN模式配置
tun:
  enable: true
  stack: gvisor
  device: utun
  endpoint-independent-nat: true
  auto-route: false
  auto-detect-interface: false
  auto-redirect: false
  strict-route: false

# DNS配置
dns:
  enable: true
  cache-algorithm: arc
  listen: 0.0.0.0:7874
  ipv6: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.20.0.1/16
  nameserver:
    # 上海电信 DNS
    - 202.96.209.5
    - 202.96.209.133
    - 116.228.111.118
    # 上海联通 DNS
    - 210.22.70.3
    - 210.22.84.3
    - 223.5.5.5
    - 119.29.29.29
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - "geosite:cn"

  # 支持通配符域名 (例如: *.clash.dev, *.foo.*.example.com )
  # 不使用通配符的域名优先级高于使用通配符的域名 (例如: foo.example.com > *.example.com > .example.com )
  # 注意: +.foo.com 的效果等同于 .foo.com 和 foo.com
  hosts:
    "*.clash.dev": 127.0.0.1
    "alpha.clash.dev": "::1"
  # 跳过证书验证,解决部分兼容性问题 https://help.nextdns.io/t/g9hdkjz
  skip-cert-verify: false
# ==================== EOF ====================
