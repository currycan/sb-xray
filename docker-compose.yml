services:
  sb-xray:
    image: docker.io/currycan/sb-xray:latest
    container_name: sb-xray
    # 小内存节点（内存不超过 512 MB 的 VPS）内存硬约束，防止 xray VSZ 暴走触发宿主级 OOM
    mem_limit: 460m
    mem_reservation: 380m
    memswap_limit: 900m
    environment:
      - DOMAIN=$domain
      - CDNDOMAIN=$cdndomain
      - DECODE=$code
      - ACMESH_DEBUG=1
      # CA 候选（均支持 DNS-01 通配符证书）：
      #   letsencrypt  无需 EAB，50 cert/domain/week，默认推荐
      #   zerossl      acme.sh 自动申领 EAB；失败多次后会触发 retryafter=86400 冷却
      #   google       手动 EAB 凭据（Google Cloud Shell 获取，7 天内一次性有效）
      # 注意：buypass 不支持通配符，本项目场景勿选
      - ACMESH_SERVER_NAME=letsencrypt
      # 仅 Google / 预分配 ZeroSSL EAB 时需要填；letsencrypt 忽略
      - ACMESH_EAB_KID=$eab_kid
      - ACMESH_EAB_HMAC_KEY=$eab_hmac_key
      - DEST_HOST=speed.cloudflare.com
      - LISTENING_PORT=443
      # xray / sing-box 日志级别：debug | info | warning | error，默认 warning
      - LOG_LEVEL=warning
      # Python entrypoint 日志级别 (DEBUG|INFO|WARNING|ERROR|CRITICAL)；与 LOG_LEVEL 分离，
      # 避免 xray 的 "warning" 字符串意外屏蔽启动阶段的 INFO 级进度日志。默认 INFO。
      - SB_LOG_LEVEL=INFO
      # 设为 "1" 关闭 entrypoint 日志 ANSI 彩色（非 TTY 容器 stdout 默认自动关闭）。
      # - NO_COLOR=1
      - DUFS_PATH_PREFIX=/myfiles
      - XUI_WEBBASEPATH=3xadmin
      # Gemini直连, true=直连, false=使用代理, 空=自动判断
      - GEMINI_DIRECT=
      #  ✈ 高速, 空=不添加额外节点后缀
      - NODE_SUFFIX=
      # ISP代理, US_ISP/LA_ISP/KR_ISP, 空=自动判断
      - DEFAULT_ISP=
      # # 配置provider，多个provider用换行分隔
      # - |
      #   PROVIDERS=第一个|https://<host>/api/v1/client/subscribe?token=c02d1e8f9cd19dcae0f146c4ed71541a&flag=clash.meta|优
      # Go 四件套（xray / sing-box / x-ui）共享 GC 上限
      - GOMEMLIMIT=320MiB
      - GOGC=50
      # 小内存节点降载开关（opt-out 语义，默认全部保留；置 "false"/"true" 生效）
      - ENABLE_SUBSTORE=true # false: 关掉 sub-store + http-meta（省 ~130–200 MB）
      - ENABLE_XUI=false # false: 关掉 x-ui 面板（省 ~35–55 MB）
      # - ENABLE_SUI=false  # s-ui removed
      - ENABLE_SHOUTRRR=true # false: 关掉 shoutrrr-forwarder（省 ~20–30 MB）
      # ── 回国代理（socks5 见 docs/08-tailscale-proxy-architecture.md；reverse/balance 见 docs/09-xray-reverse-bridge.md）──
      # 回国出口主开关：显式选择 CN 流量（geoip/geosite:cn）走哪条回国链路
      #   socks5   经 SOCKS5（Tailscale/OpenClash）—— 需下方 CN_EXIT_SOCKS5_HOST
      #   reverse  经 r-tunnel（VLESS reverse bridge）—— 需 ENABLE_REVERSE=true + 国内 bridge
      #   balance  socks5 + r-tunnel 主备，自动故障转移（需上述两者均就绪）
      #   off      不回国（CN 流量封禁）
      #   留空     按既有变量派生（向后兼容，建议显式设置）
      - CN_EXIT_MODE=balance
      # balance 模式健康探测（observatory 直连出站探测，可覆盖默认）
      - CN_EXIT_PROBE_URL=http://connect.rom.miui.com/generate_204
      - CN_EXIT_PROBE_INTERVAL=30s
      # reverse / balance 所需：VLESS reverse bridge（XRAY_REVERSE_UUID 自动生成并持久化；落地机配置随 show 输出下载链接）
      - ENABLE_REVERSE=true
      - REVERSE_DOMAINS=domain:home.lan,domain:nas.lan,domain:router.lan,domain:proxy.lan # 通过 bridge 出的内网域名，逗号分隔
      # socks5 / balance 所需：OpenWrt 的 Tailscale IP（tailscale ip 命令获取）+ OpenClash SOCKS5 端口
      - ENABLE_SOCKS5_PROXY=true
      - CN_EXIT_SOCKS5_HOST=$tsip
      - CN_EXIT_SOCKS5_PORT=7891
      # shoutrrr 事件总线（完整说明见 docs/07-event-bus-shoutrrr.md）
      # 留空 = dry-run，仅写日志不外推；多通道追加 ";discord://..." 或 ";slack://..."（详见文档 §6）
      # ⚠ BOT_TOKEN 中的 ":" 必须 URL-encode 为 "%3A"；chat.id 私有为负数(-100...), 公开频道用 "name"(不带 @)
      - SHOUTRRR_URLS=${shoutrrr_urls} # e.g. telegram://123456789%3AABCdef...xyz@telegram?chats=-1001234567890
      - SHOUTRRR_TITLE_PREFIX=[sb-xray:$domain] # 标题前缀；$domain 与顶部 DOMAIN=$domain 同源，由宿主 shell 或 .env 导出节点域名
      - SHOUTRRR_FORWARDER_PORT=18085 # 监听端口（仅 127.0.0.1 绑定）
      # ── isp-auto 优化开关（所有默认值已在 Dockerfile ENV 注册，此处仅在需要**覆盖**时取消注释）
      # 完整说明见 docs/04-ops-and-troubleshooting.md §2.6
      # - ISP_PROBE_INTERVAL=5m           # 小内存节点建议降频
      # - ISP_PER_SERVICE_SB=true         # 开启 sing-box 按服务分桶（Netflix/OpenAI/Claude/Gemini/Disney/YouTube 独立 balancer）
      # - ISP_FALLBACK_STRATEGY=block     # CN/HK/RU 拒绝静默走 direct
      # - ISP_RETEST_INTERVAL_HOURS=0     # 完全禁用周期性重测
      # ── v2 带宽采样器（流式 + 预热 + 时间窗 + 诊断），默认值已在 Dockerfile 注册
      # - ISP_SPEED_WINDOW_SEC=8          # 稳态测速窗口秒数（加长可减少噪声）
      # - ISP_SPEED_WARMUP_SEC=1.5        # TCP 慢启动预热丢弃秒数
      # - ISP_SPEED_MAX_BYTES=268435456   # 单样本字节封顶（256 MiB 覆盖 1 Gbps）
      # - ISP_SPEED_SAMPLES=3             # 每个节点外层采样次数
      # - ISP_SPEED_TIMEOUT_SEC=20        # 单样本硬超时
      # - ISP_SPEED_URL_MAP='{"proxy-kr-isp":"https://kr-speed.example/100mb"}'  # 按 tag 覆盖探针 URL
      # - ISP_SPEED_DIAG_ENABLED=false    # 关闭 _ISP_SPEEDS_DIAG_JSON（默认开）
      # - ISP_SPEED_LEGACY=true           # kill switch：回退到 v1 单次 GET 采样器
    ports:
      - "443:443/tcp"
      - "443:443/udp" # use UDP for usage of HTTP/3
    volumes:
      - ./pki:/pki
      - ./acmecerts:/acmecerts
      - ./.envs:/.env
      - ./sb-xray:/sb-xray
      - ./x-ui:/etc/x-ui/
      - ./x-ui:/x-ui/db
      # - ./s-ui:/s-ui/db  # s-ui removed
      - ./sub-store:/sub-store/data
      - ./nginx/http:/etc/nginx/conf.d
      - ./nginx/tcp:/etc/nginx/stream.d
      - ./nginx-dhparam:/etc/nginx/dhparam
      - ./data:/data
      - ./logs:/var/log
      # GeoIP/GeoSite 规则库缓存,避免每次容器重启重下 ~100 MB
      - ./geo:/geo
      # - /lib/modules:/lib/modules:ro
    restart: always
    tty: true
    network_mode: host
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    ulimits:
      nproc: 65535
      nofile:
        soft: 65536
        hard: 65536
