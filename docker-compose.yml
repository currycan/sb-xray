services:
  sb-xray:
    image: docker.io/currycan/sb-xray:latest
    container_name: sb-xray
    # watchtower 白名单：仅本容器纳入自动更新（见 .superpowers/specs/2026-06-09-watchtower-auto-update-design.md）
    labels:
      - com.centurylinklabs.watchtower.enable=true
    # 小内存节点（内存不超过 512 MB 的 VPS）内存硬约束，防止 xray VSZ 暴走触发宿主级 OOM
    mem_limit: 460m
    mem_reservation: 380m
    memswap_limit: 900m
    environment:
      - DOMAIN=$domain
      - CDNDOMAIN=$cdndomain
      - DECODE=$code
      # 远程密钥库加密 blob 地址；镜像内默认空(P2-4/§4 去硬编码账号),启用 DECODE 解密的部署须在 .env 设 secrets_url。空默认时 decrypt 走 DECODE-gate SKIP,不触发空 URL fetch。
      - SECRETS_URL=${secrets_url:-}
      - ACMESH_DEBUG=1
      # CA 候选（均支持 DNS-01 通配符证书）：
      #   letsencrypt  无需 EAB，50 cert/domain/week，默认推荐
      #   zerossl      acme.sh 自动申领 EAB；失败多次后会触发 retryafter=86400 冷却
      #   google       手动 EAB 凭据（Google Cloud Shell 获取，7 天内一次性有效）
      # 注意：buypass 不支持通配符，本项目场景勿选
      - ACMESH_SERVER_NAME=letsencrypt
      # 仅 Google / 预分配 ZeroSSL EAB 时需要填；letsencrypt 忽略
      - ACMESH_EAB_KID=$eab_kid
      - ACMESH_EAB_HMAC_KEY=$eab_hmac_key
      - DEST_HOST=speed.cloudflare.com
      - LISTENING_PORT=443
      # xray / sing-box 日志级别：debug | info | warning | error，默认 warning
      - LOG_LEVEL=warning
      # Python entrypoint 日志级别 (DEBUG|INFO|WARNING|ERROR|CRITICAL)；与 LOG_LEVEL 分离，
      # 避免 xray 的 "warning" 字符串意外屏蔽启动阶段的 INFO 级进度日志。默认 INFO。
      - SB_LOG_LEVEL=INFO
      # 设为 "1" 关闭 entrypoint 日志 ANSI 彩色（非 TTY 容器 stdout 默认自动关闭）。
      # - NO_COLOR=1
      # 日志体积治理（均有镜像内默认，以下仅为可选覆盖；详见 docs/04 §6.7）：
      #   nginx 访问日志档位 minimal(默认,仅记非 2xx/3xx) | full | off
      # - NGINX_ACCESS_LOG=minimal
      #   logrotate 轮转：单文件阈值 / 保留份数 / 调度(空串禁用)
      # - LOG_ROTATE_SIZE=50M
      # - LOG_ROTATE_KEEP=3
      # - LOG_ROTATE_CRON=0 * * * *
      - DUFS_PATH_PREFIX=/myfiles
      - XUI_WEBBASEPATH=3xadmin
      #  ✈ 高速, 空=不添加额外节点后缀
      - NODE_SUFFIX=
      # ISP代理, US_ISP/LA_ISP/KR_ISP, 空=自动判断
      - DEFAULT_ISP=
      # # 配置provider，多个provider用换行分隔
      # - |
      #   PROVIDERS=第一个|https://<host>/api/v1/client/subscribe?token=c02d1e8f9cd19dcae0f146c4ed71541a&flag=clash.meta|优
      # Go 四件套(xray / sing-box / x-ui)共享 GC 软上限。
      # 镜像内已有默认(Dockerfile ENV GOMEMLIMIT/GOGC);此处仅为文档化覆盖,
      # 删除这两行不会丢失软上限保护(watchtower 重建也安全)。
      - GOMEMLIMIT=320MiB
      - GOGC=50
      # 小内存节点降载开关（opt-out 语义，默认全部保留；置 "false"/"true" 生效）
      - ENABLE_SUBSTORE=true # false: 关掉 sub-store + http-meta（省 ~130–200 MB）
      - ENABLE_XUI=false # false: 关掉 x-ui 面板（省 ~35–55 MB）
      # - ENABLE_SUI=false  # s-ui removed
      - ENABLE_SHOUTRRR=true # false: 关掉 shoutrrr-forwarder（省 ~20–30 MB）
      # ── 回国代理（socks5 见 docs/07-tailscale-proxy-architecture.md；reverse/balance 见 docs/08-xray-reverse-bridge.md）──
      # 回国出口主开关：显式选择 CN 流量（geoip/geosite:cn）走哪条回国链路
      #   socks5   经 SOCKS5（Tailscale/OpenClash）—— 需下方 CN_EXIT_SOCKS5_HOST
      #   reverse  经 r-tunnel（VLESS reverse bridge）—— 需 ENABLE_REVERSE=true + 国内 bridge
      #   balance  socks5 + r-tunnel 主备，自动故障转移（需上述两者均就绪）
      #   off      不回国（CN 流量封禁）
      #   留空     按既有变量派生（向后兼容，建议显式设置）
      # 回国项均支持 .env 覆盖（${VAR:-默认}）；多 VPS 统一用 .env 注入、compose 不动。
      - CN_EXIT_MODE=${CN_EXIT_MODE:-balance}
      # balance 模式健康探测（observatory 直连出站探测，可覆盖默认）
      - CN_EXIT_PROBE_URL=${CN_EXIT_PROBE_URL:-http://connect.rom.miui.com/generate_204}
      - CN_EXIT_PROBE_INTERVAL=${CN_EXIT_PROBE_INTERVAL:-30s}
      # reverse / balance 所需：VLESS reverse bridge（XRAY_REVERSE_UUID 自动生成并持久化；落地机配置随 show 输出下载链接）
      - ENABLE_REVERSE=${ENABLE_REVERSE:-true}
      # bridge 出的内网域名（逗号分隔，如 domain:myhost.internal）；默认空＝纯回国，无内网旁路
      - "REVERSE_DOMAINS=${REVERSE_DOMAINS:-}"
      # socks5 / balance 所需：OpenWrt 的 Tailscale IP（.env 里 tsip）+ OpenClash SOCKS5 端口
      - ENABLE_SOCKS5_PROXY=${ENABLE_SOCKS5_PROXY:-true}
      - CN_EXIT_SOCKS5_HOST=${tsip}
      - CN_EXIT_SOCKS5_PORT=${CN_EXIT_SOCKS5_PORT:-7891}
      # shoutrrr 事件总线（完整说明见 docs/06-event-bus-shoutrrr.md）
      # 留空 = dry-run，仅写日志不外推；多通道追加 ";discord://..." 或 ";slack://..."（详见文档 §6）
      # ⚠ BOT_TOKEN 中的 ":" 必须 URL-encode 为 "%3A"；chat.id 私有为负数(-100...), 公开频道用 "name"(不带 @)
      - SHOUTRRR_URLS=${shoutrrr_urls} # e.g. telegram://123456789%3AABCdef...xyz@telegram?chats=-1001234567890
      - SHOUTRRR_TITLE_PREFIX=[sb-xray:$domain] # 标题前缀；$domain 与顶部 DOMAIN=$domain 同源，由宿主 shell 或 .env 导出节点域名
      - SHOUTRRR_FORWARDER_PORT=18085 # 监听端口（仅 127.0.0.1 绑定）
      # ── isp-auto 优化开关（所有默认值已在 Dockerfile ENV 注册，此处仅在需要**覆盖**时取消注释）
      # 完整说明见 docs/04-ops-and-troubleshooting.md §2.6
      # - ISP_PROBE_INTERVAL=5m           # 小内存节点建议降频
      # - ISP_PER_SERVICE_SB=true         # 开启 sing-box 按服务分桶（Netflix/OpenAI/Claude/Gemini/Disney/YouTube 独立 balancer）
      # - ISP_FALLBACK_STRATEGY=block     # CN/HK/RU 拒绝静默走 direct
      # - ISP_RETEST_INTERVAL_HOURS=0     # 完全禁用周期性重测
      # ── v2 带宽采样器（流式 + 预热 + 时间窗 + 诊断），默认值已在 Dockerfile 注册
      # - ISP_SPEED_WINDOW_SEC=8          # 稳态测速窗口秒数（加长可减少噪声）
      # - ISP_SPEED_WARMUP_SEC=1.5        # TCP 慢启动预热丢弃秒数
      # - ISP_SPEED_MAX_BYTES=268435456   # 单样本字节封顶（256 MiB 覆盖 1 Gbps）
      # - ISP_SPEED_SAMPLES=3             # 每个节点外层采样次数
      # - ISP_SPEED_TIMEOUT_SEC=20        # 单样本硬超时
      # - ISP_SPEED_URL_MAP='{"proxy-kr-isp":"https://kr-speed.example/100mb"}'  # 按 tag 覆盖探针 URL
      # - ISP_SPEED_DIAG_ENABLED=false    # 关闭 _ISP_SPEEDS_DIAG_JSON（默认开）
      # - ISP_SPEED_LEGACY=true           # kill switch：回退到 v1 单次 GET 采样器
    ports:
      - "443:443/tcp"
      - "443:443/udp" # use UDP for usage of HTTP/3
    volumes:
      - ./pki:/pki
      - ./acmecerts:/acmecerts
      # ⚠ 勿"修正"为 ./.env：宿主 .envs/ 是目录，挂成容器内 /.env/ 目录，持久化运行时
      # 生成的随机 secret/UUID/账户（entrypoint 读 /.env/sb-xray、/.env/status、/.env/secret）。
      # 与同目录的 .env 文件（compose 变量插值源）是两码事；删错会导致 UUID 每次重建。
      - ./.envs:/.env
      - ./sb-xray:/sb-xray
      - ./x-ui:/etc/x-ui/
      - ./x-ui:/x-ui/db
      # - ./s-ui:/s-ui/db  # s-ui removed
      - ./sub-store:/sub-store/data
      - ./nginx/http:/etc/nginx/conf.d
      - ./nginx/tcp:/etc/nginx/stream.d
      - ./nginx-dhparam:/etc/nginx/dhparam
      - ./data:/data
      - ./logs:/var/log
      # GeoIP/GeoSite 规则库缓存,避免每次容器重启重下 ~100 MB
      - ./geo:/geo
      # - /lib/modules:/lib/modules:ro
    restart: always
    tty: true
    network_mode: host
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    ulimits:
      nproc: 65535
      nofile:
        soft: 65536
        hard: 65536

  # 全自动镜像更新（方案 B + L1 canary 护栏，详见 .superpowers/specs/2026-06-09-watchtower-auto-update-design.md）
  # ⚠ 镜像用 nickfedor/watchtower（containrrr/watchtower 已停摆，与现代 Docker daemon 不兼容会 panic）
  watchtower:
    image: docker.io/nickfedor/watchtower:latest@sha256:5a6262b7a66a353bd2cdb1e0cace6c5b7cb4d475d1080d6a57fe4ec82fe455b6
    container_name: watchtower
    # 通知标题用容器 hostname；设为节点域名以便多节点环境一眼可辨（否则显示容器 hash）
    hostname: ${domain:-sb-xray}
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      # schedule 用容器时区解释；设北京时区以便 schedule 直接写本地时间
      - TZ=${TZ:-Asia/Shanghai}
      # 白名单：只更新带 com.centurylinklabs.watchtower.enable=true 的容器，绝不触碰节点上其它容器
      - WATCHTOWER_LABEL_ENABLE=true
      # 错峰 schedule（6 段 cron，时区＝上方 TZ）：默认低峰整点；canary 节点经 .env 覆盖 WATCHTOWER_SCHEDULE 到更早时段先行验证
      - WATCHTOWER_SCHEDULE=${WATCHTOWER_SCHEDULE:-0 0 4 * * *}
      # 自动更新通知，复用 sb-xray 同源 shoutrrr（Telegram）。注：仅 schedule 模式发，run-once/sbx-update 不发（设计 §4.5）
      # 通知：watchtower 自带通知为英文且不可定制（仅 Go template，维护成本不值），故关闭。
      # 所有 Telegram 报警统一由 sbx-canary-check 用中文经 shoutrrr-forwarder 发出
      # （更新成功/自检失败均中文，见 sources/vps/sbx-canary-check.sh）
      # 更新后删旧镜像省盘
      - WATCHTOWER_CLEANUP=true
