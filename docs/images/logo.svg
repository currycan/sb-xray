<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <style>
      .arc { stroke-linecap: round; fill: none; }
    </style>

    <!-- Wedge gradient: cool blue tones -->
    <linearGradient id="wedgeGrad" gradientUnits="userSpaceOnUse" x1="120" y1="250" x2="600" y2="250">
      <stop offset="0%" stop-color="#99AACC" />
      <stop offset="100%" stop-color="#5588BB" />
    </linearGradient>

    <!-- Wedge glow filter -->
    <filter id="wedgeGlow" x="-20%" y="-100%" width="140%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur" />
      <feFlood flood-color="#4488BB" flood-opacity="0.15" result="color" />
      <feComposite in="color" in2="blur" operator="in" result="glow" />
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Warm backdrop radial gradient -->
    <radialGradient id="warmBackdrop" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFAF5" />
      <stop offset="100%" stop-color="#FFFAF5" stop-opacity="0" />
    </radialGradient>

    <!-- Ray gradients (7 rays) -->
    <linearGradient id="ray1Grad" gradientUnits="userSpaceOnUse" x1="470" y1="200" x2="540" y2="80">
      <stop offset="0%" stop-color="#CC4400" />
      <stop offset="50%" stop-color="#FFB347" />
      <stop offset="100%" stop-color="#E8E0D0" />
    </linearGradient>
    <linearGradient id="ray2Grad" gradientUnits="userSpaceOnUse" x1="500" y1="220" x2="610" y2="130">
      <stop offset="0%" stop-color="#CC4400" />
      <stop offset="50%" stop-color="#FFB347" />
      <stop offset="100%" stop-color="#E8E0D0" />
    </linearGradient>
    <linearGradient id="ray3Grad" gradientUnits="userSpaceOnUse" x1="540" y1="235" x2="660" y2="195">
      <stop offset="0%" stop-color="#CC4400" />
      <stop offset="50%" stop-color="#FFB347" />
      <stop offset="100%" stop-color="#E8E0D0" />
    </linearGradient>
    <linearGradient id="ray4Grad" gradientUnits="userSpaceOnUse" x1="620" y1="250" x2="700" y2="250">
      <stop offset="0%" stop-color="#CC4400" />
      <stop offset="50%" stop-color="#FFB347" />
      <stop offset="100%" stop-color="#E8E0D0" />
    </linearGradient>
    <linearGradient id="ray5Grad" gradientUnits="userSpaceOnUse" x1="540" y1="265" x2="660" y2="305">
      <stop offset="0%" stop-color="#CC4400" />
      <stop offset="50%" stop-color="#FFB347" />
      <stop offset="100%" stop-color="#E8E0D0" />
    </linearGradient>
    <linearGradient id="ray6Grad" gradientUnits="userSpaceOnUse" x1="500" y1="280" x2="610" y2="370">
      <stop offset="0%" stop-color="#CC4400" />
      <stop offset="50%" stop-color="#FFB347" />
      <stop offset="100%" stop-color="#E8E0D0" />
    </linearGradient>
    <linearGradient id="ray7Grad" gradientUnits="userSpaceOnUse" x1="470" y1="300" x2="540" y2="420">
      <stop offset="0%" stop-color="#CC4400" />
      <stop offset="50%" stop-color="#FFB347" />
      <stop offset="100%" stop-color="#E8E0D0" />
    </linearGradient>
  </defs>

  <g transform="translate(380, 250)">

    <!-- Warm backdrop circle -->
    <circle cx="0" cy="0" r="240" fill="url(#warmBackdrop)" />

    <!-- Wall arcs: warm gradient depth feel -->
    <!-- Outer arcs: darkest, widest -->
    <path class="arc" stroke="#A52020" stroke-width="26" d="M 40 -155 A 160 160 0 0 0 -158 -25" />
    <path class="arc" stroke="#A52020" stroke-width="26" d="M -158 25 A 160 160 0 0 0 40 155" />

    <!-- Middle arcs: medium -->
    <path class="arc" stroke="#D06020" stroke-width="22" d="M 30 -111 A 115 115 0 0 0 -112 -25" />
    <path class="arc" stroke="#D06020" stroke-width="22" d="M -112 25 A 115 115 0 0 0 30 111" />

    <!-- Inner arcs: lightest, narrowest -->
    <path class="arc" stroke="#CC8800" stroke-width="18" d="M 20 -67 A 70 70 0 0 0 -65 -25" />
    <path class="arc" stroke="#CC8800" stroke-width="18" d="M -65 25 A 70 70 0 0 0 20 67" />

    <!-- Wedge: cool glass with glow aura -->
    <polygon fill="none" stroke="url(#wedgeGrad)" stroke-width="3.5"
      points="-260,0 -80,-14 160,-3 220,0 160,3 -80,14"
      filter="url(#wedgeGlow)" />

    <!-- Rays: tapered paths (triangular shapes) with warm-to-cream gradients -->
    <path fill="url(#ray1Grad)" stroke="none" opacity="1.0"
      d="M 90,-43 L 160,-163 L 160,-177 Z" />
    <path fill="url(#ray2Grad)" stroke="none" opacity="0.88"
      d="M 120,-23 L 230,-114 L 230,-126 Z" />
    <path fill="url(#ray3Grad)" stroke="none" opacity="0.76"
      d="M 160,-9 L 280,-50 L 280,-60 Z" />
    <path fill="url(#ray4Grad)" stroke="none" opacity="0.64"
      d="M 240,-6 L 320,-5 L 320,5 L 240,6 Z" />
    <path fill="url(#ray5Grad)" stroke="none" opacity="0.52"
      d="M 160,9 L 280,50 L 280,60 Z" />
    <path fill="url(#ray6Grad)" stroke="none" opacity="0.40"
      d="M 120,23 L 230,114 L 230,126 Z" />
    <path fill="url(#ray7Grad)" stroke="none" opacity="0.30"
      d="M 90,43 L 160,163 L 160,177 Z" />

  </g>
</svg>