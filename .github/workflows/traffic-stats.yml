name: Repository Traffic Stats

on:
  schedule:
    # 每天 UTC 2:17 (北京时间 10:17) 执行；错峰避开 daily-build
    - cron: "17 2 * * *"
  workflow_dispatch:

concurrency:
  group: traffic-stats
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      # 工作区根目录检出 traffic 孤儿分支：CSV 在此累积，提交也回推到此分支
      - name: Checkout traffic data branch
        uses: actions/checkout@v6
        with:
          ref: traffic

      # 渲染脚本只存在于默认分支，单独检出到子目录供本次运行调用
      - name: Checkout render script from default branch
        uses: actions/checkout@v6
        with:
          path: .ci-src

      # 拉取 clones/views 流量数据并累积写入 ./traffic/*.csv（突破 GitHub 14 天保留限制）
      - name: Collect repository traffic
        uses: sangonzal/repository-traffic-action@v.0.1.6
        env:
          TRAFFIC_ACTION_TOKEN: ${{ secrets.TRAFFIC_ACTION_TOKEN }}

      # 上一步是 Docker action，以 root 创建 traffic/ 目录与 CSV；
      # 交还属主，否则后续 runner 用户无法在该目录写入 PNG
      - name: Normalize traffic dir ownership
        run: sudo chown -R "$(id -u):$(id -g)" traffic

      # 可观测性:绿跑却「Nothing to commit」时,一眼区分「API 暂无新数据(正常,通常是 GitHub
      # Traffic 固有 2-3 天上报延迟)」与「抓取异常」。无此输出，绿跑会被误读为已更新。
      - name: Report traffic data freshness
        run: |
          csv=traffic/clones.csv
          if [ ! -f "$csv" ]; then echo "::warning::$csv not found"; exit 0; fi
          rows=$(awk 'END{print NR-1}' "$csv")
          last=$(awk 'END{print}' "$csv" | cut -d, -f1)
          today=$(date -u +%F)
          {
            echo "### 项目活跃度数据新鲜度"
            echo ""
            echo "- clones.csv 数据行数: \`$rows\`"
            echo "- 最新数据日期: \`$last\`  ·  当前 UTC 日期: \`$today\`"
            echo ""
            echo "> 最新日期落后今日数天通常是 GitHub Traffic API 固有的 2-3 天上报延迟，而非流水线故障。"
          } | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Render clone traffic trend chart
        run: |
          python -m pip install --quiet matplotlib
          python .ci-src/.github/scripts/render_traffic.py

      - name: Commit traffic data and chart
        uses: EndBug/add-and-commit@v10
        with:
          # 只收录所需产物；sangonzal action 还会生成内置的 plots.png，
          # 我们不引用它，用 remove 显式剔除（--ignore-unmatch 容忍未跟踪）
          add: |
            traffic/clones.csv
            traffic/views.csv
            traffic/clones.png
          remove: "--ignore-unmatch traffic/plots.png"
          message: "chore: update repository traffic stats"
          default_author: github_actions
