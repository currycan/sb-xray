name: CI Quality Gate

# PR 质量门:ruff / mypy / pytest(--cov, fail_under=85)/ smoke(离线静态)。
# 后续所有改造期的回归基座——任一步骤非零退出即拦截合并。
# 纯文档改动不进镜像也不影响 Python 行为,跳过以省 runner。
on:
  pull_request:
    paths-ignore:
      - 'docs/**'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dev dependencies
        run: python3 -m pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check scripts/sb_xray tests

      - name: Mypy type check
        run: mypy

      - name: Pytest with coverage gate
        run: python3 -m pytest --cov

      - name: Smoke (offline static)
        run: SKIP_COMPOSE=1 ./scripts/test_smoke.sh
